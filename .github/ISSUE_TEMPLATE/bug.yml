---
name: "Bug report"
description: "Report a bug with the Battery card"
body:
- type: markdown
  attributes:
    value: Before you open a new issue, search through the existing issues to see if others have had the same problem.
- type: textarea
  attributes:
    label: "System Health details"
    description: "Home Assistant version, browser, and how the card was installed (HACS / manual)."
  validations:
    required: true
- type: checkboxes
  attributes:
    label: Checklist
    options:
      - label: I have filled out the issue template to the best of my ability.
        required: true
      - label: This issue only contains 1 issue (if you have multiple issues, open one issue for each issue).
        required: true
      - label: This issue is not a duplicate issue of any [previous issues](https://github.com/roquerodrigo/ha-battery-card/issues?q=is%3Aissue+label%3A%22Bug%22+).
        required: true
- type: textarea
  attributes:
    label: "Describe the issue"
    description: "A clear and concise description of what the issue is."
  validations:
    required: true
- type: textarea
  attributes:
    label: Reproduction steps
    description: "Without steps to reproduce, it will be hard to fix. It is very important that you fill out this part. Issues without it will be closed."
    value: |
      1.
      2.
      3.
      ...
  validations:
    required: true
- type: textarea
  attributes:
    label: "Card configuration"
    description: "The YAML of the card (the `type: custom:battery-card` block)."
    render: yaml
  validations:
    required: true
- type: textarea
  attributes:
    label: "Browser console errors"
    description: "Open the browser dev tools (F12) → Console, and paste any errors."
    render: text
